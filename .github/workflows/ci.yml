name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # A-10 (debito-tecnico E10): detect whether a PR touches the install/smoke surface, so the
  # expensive E2E `smoke` job runs on PRs ONLY when relevant (installer, install-kit, governance,
  # the smoke scripts, or this workflow) — not on doc/wiki-only PRs. On push/dispatch the smoke job
  # ignores this and always runs (see its `if`). Closes the gap that let the smoke-script `.ps1`
  # regression pass #161 unseen (the smoke job did not run on PRs at all).
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      smoke: ${{ steps.filter.outputs.smoke }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            smoke:
              - 'packages/sertor/**'
              - 'packages/sertor-install-kit/**'
              - 'packages/sertor-flow/**'
              - 'scripts/smoke.sh'
              - 'scripts/smoke.ps1'
              - '.github/workflows/ci.yml'

  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        # FEAT-003 (epica debito-tecnico): Windows enabled first (green 2026-06-23), then Linux —
        # the suite must pass on both ("prima Windows, poi Linux"). fail-fast: false so a failure
        # on one OS does not cancel the other (we want to see both).
        os: [windows-latest, ubuntu-latest]
        python: ["3.12"]
        # A-10 (debito-tecnico E10): add a Python 3.11 leg — the project declares `>=3.11`, so a
        # 3.11-only incompatibility would otherwise ship unseen. Added ubuntu-only via `include`
        # (the OS axis stays on 3.12) to catch it without doubling the whole matrix.
        include:
          - os: ubuntu-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync (all workspace packages + dev extras)
        run: uv sync --all-packages --extra dev --python ${{ matrix.python }}

      - name: Lint (ruff)
        run: uv run ruff check .

      # The `cloud` tests need Azure credentials/services and are excluded by design (CLAUDE.md):
      # the suite must pass with the local providers (glove/hash + Chroma), no network. The
      # `integration` tests (packaging install from git+url) are also skipped for now — they need
      # the ref published and network; enable them in a later phase once stable.
      - name: Tests — core (root)
        run: uv run pytest -m "not cloud and not integration"

      - name: Tests — sertor (wiki/rag installer)
        run: uv run pytest packages/sertor/tests -m "not cloud and not integration and not hooks_smoke"

      # A-09 (E2, T018/C6): drive each portable hook through the REAL host-facing vehicle
      # (`uv run --no-project python <hook>.py`) on THIS matrix OS — proves cross-OS execution with
      # no `pwsh`/shell dependency. Runs per-PR on both windows-latest and ubuntu-latest.
      - name: Smoke — portable hooks (uv run --no-project python)
        run: uv run pytest packages/sertor/tests -m hooks_smoke -v

      - name: Tests — sertor-install-kit
        run: uv run pytest packages/sertor-install-kit/tests -m "not cloud and not integration"

      - name: Tests — sertor-flow (governance installer)
        run: uv run pytest packages/sertor-flow/tests -m "not cloud and not integration"

      - name: Tests — speclift (vendored self-host)
        run: uv run pytest packages/speclift/tests -m "not cloud"

      - name: Lint — speclift (vendored, own ruff config)
        run: uv run ruff check packages/speclift

      - name: Tests — specaudit (vendored self-host)
        run: uv run pytest packages/specaudit/tests -m "not cloud"

      - name: Lint — specaudit (vendored, own ruff config)
        run: uv run ruff check packages/specaudit

  # End-to-end host smoke (FEAT-003 epica debito-tecnico): installs Sertor capabilities from
  # git+url@<ref> exactly as a third-party host would. The matrix is {os} x {assistant}; EACH job
  # runs all three capabilities for its assistant: rag (install→index→doctor→search), wiki (deposit)
  # and flow/governance (deposit; `specify init` needs network). The host runs OUTSIDE the checkout
  # with a scrubbed env (rag provider = hash).
  #
  # A-10 (debito-tecnico E10): it is BOTH a per-PR gate AND a post-merge guardian. On push/dispatch
  # it installs from `master` (the distribution channel). On a PR it installs from the PR BRANCH
  # (`SERTOR_SMOKE_REF = github.head_ref`), so it tests the PR's OWN diff BEFORE merge — and it runs
  # on a PR ONLY when the `changes` job flags the install/smoke surface as touched (path-filter), to
  # spare runner minutes on doc-only PRs. This closes the gap that let the smoke-script `.ps1`
  # regression pass #161 unseen (previously the smoke did not run on PRs at all).
  #
  # Per-assistant selection: pytest `-k <assistant>` picks the (assistant, capability) params for
  # this job's assistant (rag+wiki+flow). The capabilities × assistants matrix lives in the test.
  #
  # rag target = the DEDICATED real-world repo `themetriost/PgnToFen` (a C#/.NET project), cloned
  # shallow into the runner temp and passed via SERTOR_SMOKE_TARGET (the wrapper forwards it for
  # `rag` only; wiki/flow always use the synthetic fixture). This exercises indexing of real .cs +
  # README content. Hardening option (not used): pin the clone to a fixed commit for reproducibility.
  smoke:
    name: smoke (${{ matrix.os }} / ${{ matrix.assistant }})
    needs: changes
    if: >-
      github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && needs.changes.outputs.smoke == 'true')
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        assistant: [claude, copilot-cli]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python 3.12
        run: uv python install 3.12

      # Sertor is a PRIVATE repo: the `uvx --from git+https://…/Sertor` install (and the nested
      # `uv add sertor-core @ git+…`) clone it anonymously, which fails on a runner with no creds.
      # Rewrite that one URL to carry the workflow GITHUB_TOKEN (read access to its own repo) so the
      # clone authenticates. Covers both packages/sertor and packages/sertor-flow (same repo).
      # Scoped to Sertor only — the public PgnToFen and spec-kit clones stay anonymous.
      - name: Authenticate git for the private Sertor repo (uvx/uv clone)
        shell: bash
        run: >
          git config --global
          url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/themetriost/Sertor".insteadOf
          "https://github.com/themetriost/Sertor"

      # Sync the workspace so pytest can collect (the root tests/conftest.py imports sertor_core).
      # The smoke TEST itself imports only stdlib + pytest and drives the platform smoke script;
      # the sync is only to satisfy collection, not the smoke flow (which installs from git+url).
      - name: Sync (all workspace packages + dev extras)
        run: uv sync --all-packages --extra dev --python 3.12

      # Clone the dedicated real-world rag smoke target (shallow) into the runner temp, OUTSIDE the
      # Sertor checkout (the smoke requires the host to live outside the workspace for isolation).
      - name: Clone smoke target (PgnToFen)
        run: git clone --depth 1 https://github.com/themetriost/PgnToFen "${{ runner.temp }}/pgntofen"

      # Run all three capabilities (rag/wiki/flow) for this job's assistant. SERTOR_SMOKE_TARGET is
      # honoured by the wrapper for `rag` only; wiki/flow use the synthetic fixture regardless.
      # SERTOR_SMOKE_REF (A-10): install from the PR branch on a PR (tests the PR's own diff), else
      # from `master` (github.head_ref is empty on push/dispatch → the wrapper defaults to master).
      - name: Host smoke (${{ matrix.assistant }} × rag/wiki/flow from git+url@${{ github.head_ref || 'master' }})
        env:
          SERTOR_SMOKE_TARGET: ${{ runner.temp }}/pgntofen
          SERTOR_SMOKE_REF: ${{ github.head_ref || 'master' }}
        run: uv run pytest -m integration tests/integration/test_host_smoke.py -k "${{ matrix.assistant }}" -v
