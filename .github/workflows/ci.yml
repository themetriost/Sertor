name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # FEAT-003 (epica debito-tecnico): Windows enabled first (green 2026-06-23), then Linux —
        # the suite must pass on both ("prima Windows, poi Linux"). fail-fast: false so a failure
        # on one OS does not cancel the other (we want to see both).
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python 3.12
        run: uv python install 3.12

      - name: Sync (all workspace packages + dev extras)
        run: uv sync --all-packages --extra dev --python 3.12

      - name: Lint (ruff)
        run: uv run ruff check .

      # The `cloud` tests need Azure credentials/services and are excluded by design (CLAUDE.md):
      # the suite must pass with the local providers (glove/hash + Chroma), no network. The
      # `integration` tests (packaging install from git+url) are also skipped for now — they need
      # the ref published and network; enable them in a later phase once stable.
      - name: Tests — core (root)
        run: uv run pytest -m "not cloud and not integration"

      - name: Tests — sertor (wiki/rag installer)
        run: uv run pytest packages/sertor/tests -m "not cloud and not integration"

      - name: Tests — sertor-install-kit
        run: uv run pytest packages/sertor-install-kit/tests -m "not cloud and not integration"

      - name: Tests — sertor-flow (governance installer)
        run: uv run pytest packages/sertor-flow/tests -m "not cloud and not integration"

  # End-to-end host smoke (FEAT-003 epica debito-tecnico): installs the RAG capability from
  # git+url@master exactly as a third-party host would, then drives index→doctor→search to green.
  # It pulls `master` (the real distribution channel), so it is a POST-MERGE / on-demand guardian —
  # NOT a per-PR gate (it does not test the PR's own diff). Runs only on push to master and on
  # manual dispatch. The host runs OUTSIDE the checkout with a scrubbed env (provider = hash).
  #
  # Target = the DEDICATED real-world repo `themetriost/PgnToFen` (a C#/.NET project), cloned shallow
  # into the runner temp and passed via SERTOR_SMOKE_TARGET. This exercises indexing of real .cs +
  # README content, not just the synthetic fixture (which stays the local/default when the env var is
  # unset). Hardening option (not used): pin the clone to a fixed commit (`git checkout <sha>`)
  # instead of the default branch, for fully reproducible smoke content.
  smoke:
    name: smoke (${{ matrix.os }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python 3.12
        run: uv python install 3.12

      # Sync the workspace so pytest can collect (the root tests/conftest.py imports sertor_core).
      # The smoke TEST itself imports only stdlib + pytest and drives the platform smoke script;
      # the sync is only to satisfy collection, not the smoke flow (which installs from git+url).
      - name: Sync (all workspace packages + dev extras)
        run: uv sync --all-packages --extra dev --python 3.12

      # Clone the dedicated real-world smoke target (shallow) into the runner temp, OUTSIDE the
      # Sertor checkout (the smoke requires the host to live outside the workspace for isolation).
      - name: Clone smoke target (PgnToFen)
        run: git clone --depth 1 https://github.com/themetriost/PgnToFen "${{ runner.temp }}/pgntofen"

      - name: Host smoke (install→index→doctor→search from git+url@master)
        env:
          SERTOR_SMOKE_TARGET: ${{ runner.temp }}/pgntofen
        run: uv run pytest -m integration tests/integration/test_host_smoke.py -v
