[project]
name = "sertor"
version = "0.1.0"
description = "Installer del sistema-wiki (LLM Wiki) su qualunque repo ospite: console-script `sertor` e sottocomando `sertor install wiki`. Consumatore sottile di sertor-core."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Sertor" }]
dependencies = [
    "sertor-core",
]

[project.scripts]
sertor = "sertor_installer.__main__:main"

# NOTA (FEAT-015, R1): NON aggiungere qui `[tool.uv.sources] sertor-core = { git = ... }`: uv lo
# RIFIUTA perché `sertor-core` è un membro del workspace ("Workspace members must be declared as
# workspace sources"). La risoluzione standalone di `sertor-core` via `uvx`/git va verificata con un
# test end-to-end DOPO un push (uv potrebbe già scoprire il workspace dal checkout git del
# subdirectory). Vedi research.md R1 e tasks T021/T023.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# hatchling include TUTTI i file sotto la dir di package (anche non-Python come gli assets in
# `assets/**`): non serve `artifacts`/`force-include` finché il layout è dentro il package (D2, F6).
packages = ["src/sertor_installer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# `src` per `sertor_installer`; i path relativi risalgono alla root del monorepo per trovare
# `sertor_core` (../../src) e i moduli di test della root (../..).
pythonpath = ["src", "../../src", "../.."]
addopts = "-ra"
markers = [
    "cloud: test che richiedono credenziali/servizi cloud (esclusi dalla CI locale)",
    "integration: test di integrazione end-to-end",
]
