[project]
name = "sertor"
dynamic = ["version"]
description = "Installer delle capacità di Sertor (RAG + LLM Wiki) su qualunque repo ospite: console-script `sertor` e sottocomandi `sertor install rag|wiki`. Consumatore sottile di sertor-core."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Sertor" }]
keywords = ["rag", "retrieval", "installer", "wiki", "sertor"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
]
dependencies = [
    "sertor-core>=0.1.0",
    "sertor-install-kit>=0.1.0",
]

[project.urls]
Repository = "https://github.com/themetriost/Sertor"

[project.scripts]
sertor = "sertor_installer.__main__:main"

# NOTA (FEAT-015, R1): NON aggiungere qui `[tool.uv.sources] sertor-core = { git = ... }`: uv lo
# RIFIUTA perché `sertor-core` è un membro del workspace ("Workspace members must be declared as
# workspace sources"). E NON serve: VERIFICATO end-to-end (2026-06-12) che
# `uvx --from "git+…#subdirectory=packages/sertor" sertor` risolve `sertor-core` scoprendo il
# workspace dal checkout git (Built sertor-core @ git+…, exit 0), non da PyPI. Vedi research.md R1, T023.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Versione = unica fonte di verità nel file `/VERSION` della radice del monorepo (FEAT-001 packaging,
# NFR-4). Il membro punta al medesimo file via path relativo `../../VERSION`.
[tool.hatch.version]
path = "../../VERSION"
pattern = "^(?P<version>.+?)\\s*$"

[tool.hatch.build.targets.wheel]
# hatchling include TUTTI i file sotto la dir di package (anche non-Python come gli assets in
# `assets/**`): non serve `artifacts`/`force-include` finché il layout è dentro il package (D2, F6).
packages = ["src/sertor_installer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# `src` per `sertor_installer`; i path relativi risalgono alla root del monorepo per trovare
# `sertor_core` (../../src), il kit condiviso `sertor_install_kit`
# (../sertor-install-kit/src) e i moduli di test della root (../..).
pythonpath = ["src", "../../src", "../sertor-install-kit/src", "../.."]
addopts = "-ra"
markers = [
    "cloud: test che richiedono credenziali/servizi cloud (esclusi dalla CI locale)",
    "integration: test di integrazione end-to-end",
    "hooks_smoke: A-09 — esegue gli hook portabili via `uv run --no-project python` (smoke CI ubuntu+windows, C6)",
]
