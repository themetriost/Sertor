[project]
name = "sertor-flow"
dynamic = ["version"]
description = "Installer del metodo di sviluppo (SDLC) di Sertor: flusso SpecKit, gestione requisiti, delega git, costituzione-starter, blocco rituale CLAUDE.md. Pacchetto separato e ortogonale al RAG, senza dipendenza da sertor-core."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Sertor" }]
keywords = ["sdlc", "governance", "speckit", "installer", "sertor"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
]
dependencies = [
    "sertor-install-kit>=0.1.0",
]

[project.urls]
Repository = "https://github.com/themetriost/Sertor"

[project.scripts]
sertor-flow = "sertor_flow.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Versione = unica fonte di verità nel file `/VERSION` della radice del monorepo (FEAT-001 packaging,
# NFR-4). Il membro punta al medesimo file via path relativo `../../VERSION`.
[tool.hatch.version]
path = "../../VERSION"
pattern = "^(?P<version>.+?)\\s*$"

[tool.hatch.build.targets.wheel]
packages = ["src/sertor_flow"]

[tool.uv.sources]
# In sviluppo, `sertor-install-kit` si risolve dal workspace (editable), non da PyPI/git.
sertor-install-kit = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra"
markers = [
    "integration: test di integrazione end-to-end",
]
