[project]
name = "sertor-flow"
version = "0.1.0"
description = "Installer del metodo di sviluppo (SDLC) di Sertor: flusso SpecKit, gestione requisiti, delega git, costituzione-starter, blocco rituale CLAUDE.md. Pacchetto separato e ortogonale al RAG, senza dipendenza da sertor-core."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Sertor" }]
dependencies = [
    "sertor-install-kit",
]

[project.scripts]
sertor-flow = "sertor_flow.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sertor_flow"]

[tool.uv.sources]
# In sviluppo, `sertor-install-kit` si risolve dal workspace (editable), non da PyPI/git.
sertor-install-kit = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra"
markers = [
    "integration: test di integrazione end-to-end",
]
