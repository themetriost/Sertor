[project]
name = "sertor-install-kit"
version = "0.1.0"
description = "Motore di installazione condiviso (stdlib-only): artifact/plan/executor non distruttivi, merge additivi, blocco a marker, risorse bundled. Nessuna dipendenza da sertor-core. Riusato da `sertor` (wiki/rag) e `sertor-flow` (governance)."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Sertor" }]
# Nessuna dipendenza runtime: il kit è puro stdlib (importlib.resources, logging, json, pathlib).
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sertor_install_kit"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# `tests` sul path per importare il package-fixture `_assetpkg` (asset bundled) nei test resources.
pythonpath = ["src", "tests"]
addopts = "-ra"
markers = [
    "integration: test di integrazione end-to-end",
]
