[project]
name = "sertor-install-kit"
dynamic = ["version"]
description = "Motore di installazione condiviso (stdlib-only): artifact/plan/executor non distruttivi, merge additivi, blocco a marker, risorse bundled. Nessuna dipendenza da sertor-core. Riusato da `sertor` (wiki/rag) e `sertor-flow` (governance)."
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Sertor" }]
# Nessuna dipendenza runtime: il kit è puro stdlib (importlib.resources, logging, json, pathlib).
dependencies = []
# Pacchetto INTERNO (DA-P4): esonerato dai metadati user-facing (urls/classifiers/keywords). Solo la
# licenza è obbligatoria anche per i pacchetti interni; build-validato come gli altri.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Versione = unica fonte di verità nel file `/VERSION` della radice del monorepo (FEAT-001 packaging,
# NFR-4). Il membro punta al medesimo file via path relativo `../../VERSION`.
[tool.hatch.version]
path = "../../VERSION"
pattern = "^(?P<version>.+?)\\s*$"

[tool.hatch.build.targets.wheel]
packages = ["src/sertor_install_kit"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# `tests` sul path per importare il package-fixture `_assetpkg` (asset bundled) nei test resources.
pythonpath = ["src", "tests"]
addopts = "-ra"
markers = [
    "integration: test di integrazione end-to-end",
]
